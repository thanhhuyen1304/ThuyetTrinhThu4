<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Custom Navbar Fragment -->
    <nav class="custom-navbar" id="customNavbar" th:fragment="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand-custom">
                <div class="navbar-brand-icon">
                    <i class="fas fa-book-reader"></i>
                </div>
                <span>FAHASA</span>
            </a>
            
            <ul class="navbar-menu">
                <li><a href="/" class="navbar-link"><i class="fas fa-home me-2"></i>Trang Chủ</a></li>
                <li><a href="/books" class="navbar-link"><i class="fas fa-book me-2"></i>Sách</a></li>
                <li sec:authorize="hasRole('ADMIN')"><a href="/admin/orders" class="navbar-link"><i class="fas fa-box me-2"></i>Đơn Hàng</a></li>
                <li sec:authorize="hasRole('USER') and !hasRole('ADMIN')"><a href="/orders" class="navbar-link"><i class="fas fa-box me-2"></i>Đơn Hàng</a></li>
                <li sec:authorize="!isAuthenticated()"><a href="/login" class="navbar-link"><i class="fas fa-box me-2"></i>Đơn Hàng</a></li>
            </ul>
            
            <div class="navbar-actions">
                <!-- Cart (Only for USER) -->
                <a href="/cart" class="navbar-cart" sec:authorize="hasRole('USER')">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge-custom" id="cartBadgeCustom" style="display: none;">0</span>
                </a>
                
                <!-- Not Authenticated -->
                <div sec:authorize="!isAuthenticated()">
                    <a href="/login" class="btn-login me-2">Đăng Nhập</a>
                    <a href="/register" class="btn-register">Đăng Ký</a>
                </div>
                
                <!-- Authenticated User -->
                <div class="navbar-user" sec:authorize="isAuthenticated()">
                    <img th:if="${currentUser != null && currentUser.avatarUrl != null && currentUser.avatarUrl != ''}" 
                         th:src="${currentUser.avatarUrl}" 
                         alt="Avatar"
                         class="navbar-avatar">
                    <div th:if="${currentUser == null || currentUser.avatarUrl == null || currentUser.avatarUrl == ''}" 
                         class="navbar-avatar-placeholder">
                        <i class="fas fa-user"></i>
                    </div>
                    <span class="navbar-username" sec:authentication="name">User</span>
                    <i class="fas fa-chevron-down ms-2" style="font-size: 0.8rem; color: #6c757d;"></i>
                    
                    <!-- Dropdown Menu -->
                    <div class="dropdown-menu-custom">
                        <a href="/admin/dashboard" class="dropdown-item-custom" sec:authorize="hasRole('ADMIN')">
                            <i class="fas fa-user-shield"></i>
                            <span>Admin Panel</span>
                        </a>
                        <div class="dropdown-divider-custom" sec:authorize="hasRole('ADMIN')"></div>
                        <a href="/orders/delivered" class="dropdown-item-custom" sec:authorize="hasRole('USER') and !hasRole('ADMIN')">
                            <i class="fas fa-history"></i>
                            <span>Xem toàn bộ lịch sử</span>
                        </a>
                        <div class="dropdown-divider-custom" sec:authorize="hasRole('USER') and !hasRole('ADMIN')"></div>
                        <a href="/profile" class="dropdown-item-custom">
                            <i class="fas fa-user"></i>
                            <span>Hồ Sơ</span>
                        </a>
                        <div class="dropdown-divider-custom"></div>
                        <form th:action="@{/logout}" method="post" style="margin: 0;">
                            <button type="submit" class="dropdown-item-custom dropdown-item-logout" style="width: 100%; background: none; border: none; cursor: pointer;">
                                <i class="fas fa-sign-out-alt"></i>
                                <span>Đăng Xuất</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Navbar Styles Fragment -->
    <style th:fragment="navbar-styles">
        body {
            font-family: 'Poppins', sans-serif;
            padding-top: 72px;
        }
        
        /* Custom Navbar */
        .custom-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        
        .custom-navbar.scrolled {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 4px 30px rgba(0,0,0,0.12);
        }
        
        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .navbar-brand-custom {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: transform 0.3s ease;
        }
        
        .navbar-brand-custom:hover {
            transform: scale(1.05);
        }
        
        .navbar-brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .navbar-menu {
            display: flex;
            align-items: center;
            gap: 2rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        
        .navbar-link {
            text-decoration: none;
            color: #1a202c;
            font-weight: 600;
            font-size: 0.95rem;
            position: relative;
            transition: color 0.3s ease;
            padding: 0.5rem 0;
        }
        
        .navbar-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 3px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            border-radius: 2px;
        }
        
        .navbar-link:hover {
            color: #667eea;
        }
        
        .navbar-link:hover::after {
            width: 100%;
        }
        
        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        
        .navbar-cart {
            position: relative;
            color: #1a202c;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .navbar-cart:hover {
            color: #667eea;
            transform: scale(1.1);
        }
        
        .cart-badge-custom {
            position: absolute;
            top: -8px;
            right: -8px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(245, 87, 108, 0.4);
        }
        
        .navbar-user {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .navbar-user:hover {
            background: rgba(102, 126, 234, 0.1);
        }
        
        .navbar-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #667eea;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }
        
        .navbar-avatar-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }
        
        .navbar-username {
            font-weight: 600;
            color: #1a202c;
            font-size: 0.9rem;
        }
        
        .btn-login {
            padding: 0.6rem 1.5rem;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .btn-login:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn-register {
            padding: 0.6rem 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.4);
            color: white;
        }
        
        .dropdown-menu-custom {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            padding: 0.5rem;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }
        
        .navbar-user:hover .dropdown-menu-custom {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .dropdown-item-custom {
            padding: 0.75rem 1rem;
            color: #1a202c;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .dropdown-item-custom:hover {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }
        
        .dropdown-divider-custom {
            height: 1px;
            background: #e5e7eb;
            margin: 0.5rem 0;
        }
        
        .dropdown-item-logout {
            color: #ef4444;
        }
        
        .dropdown-item-logout:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }
        
        @media (max-width: 768px) {
            .navbar-menu {
                display: none;
            }
            
            .navbar-container {
                padding: 1rem;
            }
            
            .navbar-username {
                display: none;
            }
        }
    </style>
    
    <!-- Navbar JavaScript Fragment -->
    <th:block th:fragment="navbar-scripts">
        <script src="/custom.min.js"></script>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            // Toast Notification System
            class ToastNotification {
                constructor() {
                    this.container = null;
                    this.init();
                }
                
                init() {
                    if (!document.querySelector('.toast-container')) {
                        this.container = document.createElement('div');
                        this.container.className = 'toast-container';
                        this.container.style.cssText = 'position:fixed;top:100px;right:20px;z-index:99999;display:flex;flex-direction:column;gap:10px;pointer-events:none;';
                        document.body.appendChild(this.container);
                    } else {
                        this.container = document.querySelector('.toast-container');
                    }
                }
                
                show(message, type = 'info', duration = 4000) {
                    const toast = document.createElement('div');
                    toast.style.cssText = 'background:white;border-radius:12px;padding:16px 20px;min-width:300px;max-width:400px;box-shadow:0 10px 40px rgba(0,0,0,0.15);display:flex;align-items:center;gap:12px;pointer-events:all;animation:slideIn 0.3s ease-out;position:relative;overflow:hidden;';
                    
                    const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
                    const titles = { success: 'Thành công', error: 'Lỗi', warning: 'Cảnh báo', info: 'Thông báo' };
                    const colors = { success: '#10b981', error: '#ef4444', warning: '#f59e0b', info: '#3b82f6' };
                    const bgColors = { success: '#d1fae5', error: '#fee2e2', warning: '#fef3c7', info: '#dbeafe' };
                    
                    toast.innerHTML = `
                        <div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:${colors[type]};"></div>
                        <div style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:${bgColors[type]};color:${colors[type]};">${icons[type]}</div>
                        <div style="flex:1;">
                            <div style="font-weight:600;font-size:14px;color:#1f2937;margin-bottom:4px;">${titles[type]}</div>
                            <div style="font-size:13px;color:#6b7280;line-height:1.4;">${message}</div>
                        </div>
                        <button onclick="this.parentElement.remove()" style="width:24px;height:24px;border-radius:50%;background:#f3f4f6;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6b7280;font-size:16px;flex-shrink:0;">×</button>
                        <div style="position:absolute;bottom:0;left:0;height:3px;background:${colors[type]};opacity:0.3;animation:progress ${duration}ms linear;"></div>
                    `;
                    
                    this.container.appendChild(toast);
                    setTimeout(() => {
                        toast.style.animation = 'slideOut 0.3s ease-out forwards';
                        setTimeout(() => toast.remove(), 300);
                    }, duration);
                    
                    return toast;
                }
                
                success(message, duration) { return this.show(message, 'success', duration); }
                error(message, duration) { return this.show(message, 'error', duration); }
                warning(message, duration) { return this.show(message, 'warning', duration); }
                info(message, duration) { return this.show(message, 'info', duration); }
            }
            
            // Add animations
            if (!document.getElementById('toast-animations')) {
                const style = document.createElement('style');
                style.id = 'toast-animations';
                style.textContent = `
                    @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
                    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(400px); opacity: 0; } }
                    @keyframes progress { from { width: 100%; } to { width: 0%; } }
                    @media (max-width: 768px) {
                        .toast-container { right: 10px !important; left: 10px !important; top: 80px !important; }
                        .toast-container > div { min-width: auto !important; max-width: none !important; }
                    }
                `;
                document.head.appendChild(style);
            }
            
            // Global instance
            window.toast = new ToastNotification();
            window.showToast = (message, type, duration) => window.toast.show(message, type, duration);
            window.showSuccess = (message, duration) => window.toast.success(message, duration);
            window.showError = (message, duration) => window.toast.error(message, duration);
            window.showWarning = (message, duration) => window.toast.warning(message, duration);
            window.showInfo = (message, duration) => window.toast.info(message, duration);
            
            // Navbar scroll effect
            window.addEventListener('scroll', function() {
                const navbar = document.getElementById('customNavbar');
                if (navbar && window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else if (navbar) {
                    navbar.classList.remove('scrolled');
                }
            });
            
            // Update Cart Badge
            function updateCartBadge() {
                fetch('/api/cart', { credentials: 'include' })
                    .then(response => response.json())
                    .then(data => {
                        const badge = document.getElementById('cartBadgeCustom');
                        if (badge && data.items) {
                            const totalItems = data.items.reduce((sum, item) => sum + item.quantity, 0);
                            badge.textContent = totalItems;
                            if (totalItems > 0) {
                                badge.style.display = 'block';
                            } else {
                                badge.style.display = 'none';
                            }
                        }
                    })
                    .catch(error => console.error('Error updating cart badge:', error));
            }
            
            // Update cart badge and fetch recent orders on page load
            document.addEventListener('DOMContentLoaded', function() {
                if (document.getElementById('cartBadgeCustom')) {
                    updateCartBadge();
                }
            });
        </script>
    </th:block>
</body>
</html>
