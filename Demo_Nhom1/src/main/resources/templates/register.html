<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - FAHASA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f8f9fa; min-height: 100vh; overflow-x: hidden; }
        
        .auth-section {
            padding: 120px 0 80px;
            min-height: 100vh;
        }
        
        .auth-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 3rem;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .auth-brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-brand-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2.5rem;
            color: white;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.35);
        }
        
        .auth-brand-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .form-title { font-size: 1.5rem; font-weight: 700; color: #1a202c; margin-bottom: 0.5rem; }
        .form-subtitle { color: #6b7280; font-size: 0.95rem; }
        .form-subtitle a { color: #667eea; text-decoration: none; font-weight: 600; }
        
        .alert-box {
            border-radius: 0.75rem;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #fee2e2;
            color: #991b1b;
        }
        
        .form-group { margin-bottom: 1.25rem; }
        .form-label { font-weight: 600; color: #374151; margin-bottom: 0.5rem; display: block; font-size: 0.9rem; }
        
        .input-wrapper { position: relative; }
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 1rem;
        }
        
        .form-input {
            width: 100%;
            border: 2px solid #e5e7eb;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            color: #1a202c;
            background-color: #fff;
            transition: all 0.3s;
        }
        .form-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
            outline: none;
        }
        
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 1rem 0;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.35);
        }
        
        .btn-back {
            width: 100%;
            background: white;
            color: #6b7280;
            border: 2px solid #e5e7eb;
            border-radius: 0.75rem;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            display: block;
            text-align: center;
            transition: all 0.3s;
        }
        .btn-back:hover {
            border-color: #667eea;
            color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }
    </style>
</head>
<body>
    <div class="auth-section">
        <div class="container">
            <div class="auth-card">
                <div class="auth-brand">
                    <div class="auth-brand-icon">
                        <i class="fas fa-book-reader"></i>
                    </div>
                    <h1 class="auth-brand-title">FAHASA</h1>
                </div>
                
                <div class="form-header mb-4">
                    <h2 class="form-title">Đăng Ký Tài Khoản</h2>
                    <p class="form-subtitle">
                        Đã có tài khoản? <a href="/login">Đăng nhập ngay</a>
                    </p>
                </div>
                
                <div th:if="${error}" class="alert-box">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${error}">Có lỗi xảy ra!</span>
                </div>
                
                <form th:action="@{/register}" method="post" th:object="${registerRequest}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="form-group">
                        <label class="form-label">Tên đăng nhập *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" class="form-input" th:field="*{username}" placeholder="Nhập tên đăng nhập" required autofocus>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Email *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" class="form-input" th:field="*{email}" placeholder="Nhập địa chỉ email" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Mật khẩu *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-input" th:field="*{password}" placeholder="Nhập mật khẩu" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Xác nhận mật khẩu *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-input" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Họ và tên *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-id-card input-icon"></i>
                            <input type="text" class="form-input" th:field="*{fullName}" placeholder="Nhập họ và tên đầy đủ" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Số điện thoại *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-phone input-icon"></i>
                            <input type="tel" class="form-input" th:field="*{phone}" placeholder="Nhập số điện thoại" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Địa chỉ *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-map-marker-alt input-icon"></i>
                            <input type="text" class="form-input" th:field="*{address}" placeholder="Nhập địa chỉ giao hàng" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-user-plus me-2"></i>Đăng Ký
                    </button>
                    
                    <a href="/" class="btn-back">
                        <i class="fas fa-arrow-left me-2"></i>Quay Lại Trang Chủ
                    </a>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
