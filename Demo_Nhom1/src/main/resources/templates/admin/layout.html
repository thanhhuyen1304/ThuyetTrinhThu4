<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - FAHASA Admin'">Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style th:fragment="admin-styles">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Navbar - Glass Morphism */
        .admin-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            z-index: 1030;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .admin-navbar .navbar-brand {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.3s;
        }
        
        .admin-navbar .navbar-brand:hover {
            transform: scale(1.05);
        }
        
        /* Sidebar - Glass Morphism */
        .admin-sidebar {
            position: fixed;
            top: 70px;
            left: 0;
            height: calc(100vh - 70px);
            width: 280px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 4px 0 30px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .admin-sidebar::-webkit-scrollbar {
            width: 6px;
        }
        
        .admin-sidebar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }
        
        .admin-sidebar::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
        }
        
        .admin-menu {
            padding: 1.5rem 0;
            flex: 1;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            color: #4b5563;
            text-decoration: none;
            transition: all 0.3s;
            border-left: 4px solid transparent;
            font-weight: 500;
            position: relative;
        }
        
        .menu-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
        
        .menu-item:hover {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }
        
        .menu-item:hover::before {
            width: 4px;
        }
        
        .menu-item.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
            color: #667eea;
            font-weight: 600;
        }
        
        .menu-item.active::before {
            width: 4px;
        }
        
        .menu-item i {
            width: 24px;
            margin-right: 1rem;
            font-size: 1.125rem;
        }
        
        .menu-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.3), transparent);
            margin: 1rem 1.5rem;
        }
        
        .menu-bottom {
            padding: 1rem 0;
            border-top: 1px solid rgba(102, 126, 234, 0.2);
            margin-top: auto;
        }
        
        /* Main Content */
        .admin-content {
            margin-left: 280px;
            margin-top: 70px;
            min-height: calc(100vh - 70px);
            padding: 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        /* Page Title */
        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: white !important;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
            margin-bottom: 0.5rem;
            -webkit-text-fill-color: white !important;
        }
        
        .page-subtitle {
            color: white;
            font-size: 1.125rem;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        
        /* Card - Glass Morphism */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .card-header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
            padding: 1.5rem;
            font-weight: 600;
            color: #667eea;
        }
        
        /* Buttons */
        .btn {
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }
        
        .btn-info {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }
        
        /* Table */
        .table {
            color: #4b5563;
        }
        
        .table thead {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            color: #667eea;
            font-weight: 600;
        }
        
        .table tbody tr {
            transition: all 0.3s;
        }
        
        .table tbody tr:hover {
            background: rgba(102, 126, 234, 0.05);
            transform: scale(1.01);
        }
        
        /* Badge */
        .badge {
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-weight: 600;
        }
        
        /* Form */
        .form-control, .form-select {
            border-radius: 12px;
            border: 2px solid rgba(102, 126, 234, 0.2);
            padding: 0.75rem 1rem;
            transition: all 0.3s;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.25);
        }
        
        .form-label {
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 0.5rem;
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            .admin-sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            
            .admin-sidebar.show {
                transform: translateX(0);
            }
            
            .admin-content {
                margin-left: 0;
            }
            
            .mobile-menu-btn {
                display: block !important;
            }
        }
        
        .mobile-menu-btn {
            display: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="admin-navbar" th:fragment="admin-navbar">
        <a href="/" class="navbar-brand">
            <i class="fas fa-book-reader"></i> FAHASA
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <button class="mobile-menu-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i> Menu
            </button>
            <span style="color: #667eea; font-weight: 600;">
                <i class="fas fa-user-shield me-2"></i>Admin Panel
            </span>
        </div>
    </nav>
    
    <!-- Sidebar -->
    <div class="admin-sidebar" id="adminSidebar" th:fragment="admin-sidebar">
        <div class="admin-menu">
            <a href="/admin/dashboard" class="menu-item" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
            
            <a href="/admin/books" class="menu-item" th:classappend="${activePage == 'books' ? 'active' : ''}">
                <i class="fas fa-book"></i>
                <span>Quản Lý Sách</span>
            </a>
            
            <a href="/admin/orders" class="menu-item" th:classappend="${activePage == 'orders' ? 'active' : ''}">
                <i class="fas fa-shopping-cart"></i>
                <span>Quản Lý Đơn Hàng</span>
            </a>
            
            <a href="/admin/users" class="menu-item" th:classappend="${activePage == 'users' ? 'active' : ''}">
                <i class="fas fa-users"></i>
                <span>Quản Lý Người Dùng</span>
            </a>
            
            <div class="menu-divider"></div>
            
            <a href="/admin/categories" class="menu-item" th:classappend="${activePage == 'categories' ? 'active' : ''}">
                <i class="fas fa-tags"></i>
                <span>Quản Lý Thể Loại</span>
            </a>
            
            <a href="/admin/activities" class="menu-item" th:classappend="${activePage == 'activities' ? 'active' : ''}">
                <i class="fas fa-history"></i>
                <span>Nhật Ký Hoạt Động</span>
            </a>
        </div>
        
        <div class="menu-bottom">
            <a href="/" class="menu-item">
                <i class="fas fa-home"></i>
                <span>Về Trang Chủ</span>
            </a>
            
            <a href="/logout" class="menu-item" onclick="event.preventDefault(); document.getElementById('logout-form').submit();">
                <i class="fas fa-sign-out-alt"></i>
                <span>Đăng Xuất</span>
            </a>
            <form id="logout-form" th:action="@{/logout}" method="post" style="display: none;"></form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:fragment="admin-scripts">
        function toggleSidebar() {
            document.getElementById('adminSidebar').classList.toggle('show');
        }
        
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('adminSidebar');
            const menuBtn = document.querySelector('.mobile-menu-btn');
            
            if (window.innerWidth <= 768 && 
                !sidebar.contains(event.target) && 
                menuBtn && !menuBtn.contains(event.target) &&
                sidebar.classList.contains('show')) {
                sidebar.classList.remove('show');
            }
        });
    </script>
</body>
</html>
