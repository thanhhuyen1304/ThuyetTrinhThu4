<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title th:text="${book.id != null ? 'Chỉnh Sửa Sách' : 'Thêm Sách Mới'} + ' - FAHASA Admin'">Book Form</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"><th:block th:insert="~{admin/layout :: admin-styles}"></th:block><style>.page-title {font-size: 2.5rem !important;}.form-card {background: rgba(255, 255, 255, 0.95);backdrop-filter: blur(10px);border: 1px solid rgba(255, 255, 255, 0.3);border-radius: 20px;box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);overflow: hidden;}.form-card-header {background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);border-bottom: 1px solid rgba(102, 126, 234, 0.2);padding: 1.5rem;font-weight: 600;color: #667eea;}.form-card-body {padding: 2rem;}.form-group {margin-bottom: 1.5rem;}.form-label {font-weight: 600;color: #4b5563;margin-bottom: 0.5rem;}.form-control, .form-select {border-radius: 12px;border: 2px solid rgba(102, 126, 234, 0.2);padding: 0.75rem 1rem;transition: all 0.3s;}.form-control:focus, .form-select:focus {border-color: #667eea;box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.25);}.image-upload-area {border: 3px dashed #cbd5e1;border-radius: 12px;padding: 2.5rem;text-align: center;background: #f8f9fa;transition: all 0.3s;cursor: pointer;}.image-upload-area:hover {border-color: #667eea;background: rgba(102, 126, 234, 0.05);}.image-upload-area i {font-size: 3rem;color: #667eea;margin-bottom: 1rem;}.image-preview {max-width: 200px;max-height: 300px;margin: 1rem auto;border-radius: 10px;box-shadow: 0 4px 15px rgba(0,0,0,0.1);}.alert {border-radius: 12px;border: none;margin-bottom: 1.5rem;}.alert-danger {background: #fee2e2;color: #991b1b;}.alert-info {background: #dbeafe;color: #1e40af;}.btn {border-radius: 12px;padding: 0.75rem 1.5rem;font-weight: 600;transition: all 0.3s;border: none;}.form-actions {display: flex;gap: 1rem;justify-content: flex-end;padding-top: 1.5rem;border-top: 1px solid rgba(102, 126, 234, 0.2);}.text-muted {color: #6b7280 !important;font-size: 0.9rem;}.badge {border-radius: 8px;padding: 0.5rem 1rem;font-weight: 600;}.section-divider {border: none;border-top: 1px solid rgba(102, 126, 234, 0.2);margin: 2rem 0;opacity: 0.5;}@media (max-width: 768px) {.form-card-body {padding: 1.5rem;}}</style></head><body><th:block th:insert="~{admin/layout :: admin-navbar}"></th:block><th:block th:insert="~{admin/layout :: admin-sidebar(activePage='books')}"></th:block><div class="admin-content"><div class="mb-4"><a href="/admin/books" class="btn btn-outline-light" style="border-radius: 10px;"><i class="fas fa-arrow-left me-2"></i>Quay lại</a></div><div class="mb-5"><h1 class="page-title"><i class="fas fa-book me-3"></i><span th:text="${book.id != null ? 'Chỉnh Sửa Sách' : 'Thêm Sách Mới'}">Book Form</span></h1><p class="page-subtitle"><i class="fas fa-arrow-right me-2"></i>Quản lý thông tin sách trong hệ thống</p></div><div class="form-card"><div class="form-card-header"><i class="fas fa-book me-2"></i>Thông Tin Sách</div><div class="form-card-body"><form th:action="@{/admin/books/save}" method="post" id="bookForm"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><input type="hidden" name="id" th:value="${book.id}" th:if="${book.id != null}"><input type="hidden" id="imageUrlField" name="imageUrl" th:value="${book.imageUrl != null ? book.imageUrl : ''}"><input type="hidden" name="averageRating" th:value="${book.averageRating != null ? book.averageRating : 0.0}"><input type="hidden" name="totalReviews" th:value="${book.totalReviews != null ? book.totalReviews : 0}"><input type="hidden" name="createdAt" th:value="${book.createdAt}" th:if="${book.createdAt != null}"><div class="alert alert-danger" th:if="${error}"><i class="fas fa-exclamation-circle me-2"></i> <span th:text="${error}"></span></div><div class="alert alert-info d-flex justify-content-between align-items-center" th:if="${book.id != null}"><div><i class="fas fa-info-circle me-2"></i> <strong>Đang chỉnh sửa sách</strong></div><div><span class="badge bg-primary" style="font-size: 1rem; padding: 0.5rem 1rem;">ID: <span th:text="${book.id}"></span></span></div></div><div class="row"><div class="col-lg-8"><div class="form-group"><label class="form-label"><i class="fas fa-tags" style="color: #3b82f6;"></i> Thể Loại <span style="color: #ef4444;">*</span></label><select class="form-select" name="category" required><option value="">Chọn thể loại</option><option th:each="cat : ${categories}" th:value="${cat.name}" th:text="${cat.name}" th:selected="${book.category != null and cat.name == book.category}">Category</option></select><small class="text-muted mt-2 d-inline-block"><a href="/admin/categories/add" target="_blank" style="color: #667eea; text-decoration: none;"><i class="fas fa-plus"></i> Thêm thể loại mới</a></small></div><div class="form-group"><label class="form-label"><i class="fas fa-book" style="color: #8b5cf6;"></i> Tên Sách <span style="color: #ef4444;">*</span></label><input type="text" class="form-control" name="title" th:value="${book.title != null ? book.title : ''}" placeholder="Nhập tên sách" required></div><div class="row"><div class="col-md-6"><div class="form-group"><label class="form-label"><i class="fas fa-user" style="color: #10b981;"></i> Tác Giả <span style="color: #ef4444;">*</span></label><input type="text" class="form-control" name="author" th:value="${book.author != null ? book.author : ''}" placeholder="Nhập tên tác giả" required></div></div><div class="col-md-6"><div class="form-group"><label class="form-label"><i class="fas fa-building" style="color: #f59e0b;"></i> Nhà Xuất Bản</label><input type="text" class="form-control" name="publisher" th:value="${book.publisher != null ? book.publisher : ''}" placeholder="Nhập nhà xuất bản"></div></div></div><div class="form-group"><label class="form-label"><i class="fas fa-align-left" style="color: #6366f1;"></i> Mô Tả</label><textarea class="form-control" name="description" rows="4" placeholder="Nhập mô tả sách" th:text="${book.description != null ? book.description : ''}"></textarea></div><div class="row"><div class="col-md-4"><div class="form-group"><label class="form-label"><i class="fas fa-calendar" style="color: #06b6d4;"></i> Năm Xuất Bản</label><input type="number" class="form-control" name="publishYear" th:value="${book.publishYear != null ? book.publishYear : ''}" placeholder="2024" min="1900" max="2100"></div></div><div class="col-md-4"><div class="form-group"><label class="form-label"><i class="fas fa-dollar-sign" style="color: #ef4444;"></i> Giá (VND) <span style="color: #ef4444;">*</span></label><input type="text" id="priceDisplay" class="form-control" placeholder="100.000" required><input type="hidden" id="priceValue" name="price" th:value="${book.price != null ? book.price : ''}"></div></div><div class="col-md-4"><div class="form-group"><label class="form-label"><i class="fas fa-boxes" style="color: #ec4899;"></i> Số Lượng <span style="color: #ef4444;">*</span></label><input type="number" class="form-control" name="stockQuantity" th:value="${book.stockQuantity != null ? book.stockQuantity : ''}" placeholder="100" required></div></div></div></div><div class="col-lg-4"><div class="form-group"><label class="form-label"><i class="fas fa-image" style="color: #ef4444;"></i> Ảnh Bìa Sách</label><div class="image-upload-area" onclick="document.getElementById('imageFile').click()"><i class="fas fa-cloud-upload-alt"></i><p class="mb-2"><strong>Chọn ảnh từ máy</strong></p><small class="text-muted">Hoặc kéo thả ảnh vào đây</small><br><small class="text-muted d-block mt-2">JPG, PNG, GIF (Max 5MB)</small></div><input type="file" id="imageFile" name="imageFile" accept="image/*" style="display: none;" onchange="previewImage(this)"><div id="imagePreviewContainer" style="display: none;"><p class="text-muted small mt-3 mb-2">Ảnh đã chọn:</p><img id="imagePreview" class="image-preview" alt="Preview"><button type="button" class="btn btn-danger w-100 mt-2" onclick="clearImage()"><i class="fas fa-times"></i> Xóa ảnh</button></div><div id="currentImageContainer" th:if="${book.imageUrl != null and book.imageUrl != ''}"><p class="text-muted small mt-3 mb-2">Ảnh hiện tại:</p><img th:src="${book.imageUrl}" class="image-preview" alt="Current"></div></div></div></div><hr class="section-divider"><div class="form-actions"><a href="/admin/books" class="btn btn-secondary"><i class="fas fa-times"></i> Hủy</a><button type="button" class="btn btn-primary" onclick="handleFormSubmit()"><i class="fas fa-save"></i> Lưu Sách</button></div></form></div></div></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script><th:block th:insert="~{admin/layout :: admin-scripts}"></th:block><script>let selectedImageFile=null;let uploadedImageUrl=null;const priceDisplay=document.getElementById('priceDisplay');const priceValue=document.getElementById('priceValue');const imageUrlField=document.getElementById('imageUrlField');function formatPrice(value){if(!value)return '';const numValue=parseFloat(value);if(isNaN(numValue))return '';const intValue=Math.floor(numValue);return intValue.toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');}function unformatPrice(value){return value.replace(/\./g,'');}if(priceValue&&priceValue.value){priceDisplay.value=formatPrice(priceValue.value);}if(priceDisplay){priceDisplay.addEventListener('input',function(e){let value=unformatPrice(e.target.value);value=value.replace(/[^\d]/g,'');priceValue.value=value;e.target.value=formatPrice(value);});}function previewImage(input){if(input.files&&input.files[0]){const file=input.files[0];if(file.size>5*1024*1024){alert('Kích thước ảnh quá lớn! Vui lòng chọn ảnh nhỏ hơn 5MB.');input.value='';selectedImageFile=null;return;}if(!file.type.startsWith('image/')){alert('Vui lòng chọn file ảnh!');input.value='';selectedImageFile=null;return;}selectedImageFile=file;const reader=new FileReader();reader.onload=function(e){const previewImg=document.getElementById('imagePreview');const previewContainer=document.getElementById('imagePreviewContainer');if(previewImg&&previewContainer){previewImg.src=e.target.result;previewContainer.style.display='block';}const currentContainer=document.getElementById('currentImageContainer');if(currentContainer){currentContainer.style.display='none';}};reader.readAsDataURL(file);}}function clearImage(){const imageFile=document.getElementById('imageFile');if(imageFile)imageFile.value='';const previewContainer=document.getElementById('imagePreviewContainer');if(previewContainer)previewContainer.style.display='none';selectedImageFile=null;uploadedImageUrl=null;const currentContainer=document.getElementById('currentImageContainer');if(currentContainer){currentContainer.style.display='block';}}function getCsrfToken(){const metaToken=document.querySelector('meta[name="_csrf"]');if(metaToken){return metaToken.getAttribute('content');}const inputToken=document.querySelector('input[name="_csrf"]');if(inputToken){return inputToken.value;}return null;}function getCsrfHeader(){const metaHeader=document.querySelector('meta[name="_csrf_header"]');if(metaHeader){return metaHeader.getAttribute('content');}return 'X-CSRF-TOKEN';}async function handleFormSubmit(){const title=document.querySelector('input[name="title"]').value.trim();const author=document.querySelector('input[name="author"]').value.trim();const category=document.querySelector('select[name="category"]').value;const priceDisplayValue=priceDisplay.value.trim();const stockQuantity=document.querySelector('input[name="stockQuantity"]').value.trim();if(!title){alert('Vui lòng nhập tên sách!');document.querySelector('input[name="title"]').focus();return;}if(!author){alert('Vui lòng nhập tác giả!');document.querySelector('input[name="author"]').focus();return;}if(!category){alert('Vui lòng chọn thể loại!');document.querySelector('select[name="category"]').focus();return;}if(!priceDisplayValue){alert('Vui lòng nhập giá sách!');priceDisplay.focus();return;}if(!stockQuantity||parseInt(stockQuantity)<0){alert('Vui lòng nhập số lượng hợp lệ!');document.querySelector('input[name="stockQuantity"]').focus();return;}priceValue.value=unformatPrice(priceDisplay.value);if(selectedImageFile){const formData=new FormData();formData.append('imageFile',selectedImageFile);const csrfToken=getCsrfToken();const csrfHeader=getCsrfHeader();try{const headers={};if(csrfToken){headers[csrfHeader]=csrfToken;}const response=await fetch('/admin/books/upload-image-ajax',{method:'POST',headers:headers,body:formData});if(!response.ok){throw new Error('Upload failed');}const result=await response.json();if(result.success==='true'||result.success===true){if(imageUrlField){imageUrlField.value=result.imageUrl;}uploadedImageUrl=result.imageUrl;}else{alert('Lỗi khi tải ảnh lên: '+(result.error||'Unknown error'));return;}}catch(error){alert('Lỗi khi tải ảnh lên: '+error.message);return;}}const bookForm=document.getElementById('bookForm');if(bookForm){bookForm.submit();}}const uploadArea=document.querySelector('.image-upload-area');['dragenter','dragover','dragleave','drop'].forEach(eventName=>{uploadArea.addEventListener(eventName,preventDefaults,false);});function preventDefaults(e){e.preventDefault();e.stopPropagation();}['dragenter','dragover'].forEach(eventName=>{uploadArea.addEventListener(eventName,highlight,false);});['dragleave','drop'].forEach(eventName=>{uploadArea.addEventListener(eventName,unhighlight,false);});function highlight(e){uploadArea.style.borderColor='var(--primary-color)';uploadArea.style.background='#e7f1ff';}function unhighlight(e){uploadArea.style.borderColor='#d1d3e2';uploadArea.style.background='#f8f9fc';}uploadArea.addEventListener('drop',handleDrop,false);function handleDrop(e){const dt=e.dataTransfer;const files=dt.files;if(files.length>0){document.getElementById('imageFile').files=files;previewImage(document.getElementById('imageFile'));}}</script></body></html>
