<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Ảnh Sách - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f8f9fc;
            padding: 50px 0;
        }
        
        .upload-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .upload-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            background: #f8f9fc;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            background: #e7f1ff;
            border-color: #5568d3;
        }
        
        .upload-area i {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .image-preview {
            max-width: 100%;
            max-height: 400px;
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            color: white;
        }
        
        .btn-skip {
            background: #6c757d;
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="upload-container">
        <div class="upload-card">
            <div class="text-center mb-4">
                <h2><i class="fas fa-image text-primary"></i> Upload Ảnh Bìa Sách</h2>
                <p class="text-muted">Sách "<span th:text="${book.title}"></span>" đã được lưu thành công!</p>
            </div>
            
            <div class="alert alert-danger" th:if="${error}">
                <i class="fas fa-exclamation-triangle"></i> <span th:text="${error}"></span>
            </div>
            
            <form th:action="@{/admin/books/upload-image}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="id" th:value="${book.id}">
                
                <div class="upload-area" onclick="document.getElementById('imageFile').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <h4>Click để chọn ảnh</h4>
                    <p class="text-muted">hoặc kéo thả ảnh vào đây</p>
                    <small class="text-muted">PNG, JPG tối đa 10MB</small>
                </div>
                
                <input type="file" id="imageFile" name="imageFile" 
                       accept="image/*" style="display: none;" 
                       onchange="previewImage(event)" required>
                
                <div id="imagePreviewContainer" style="display: none; text-align: center;">
                    <img id="imagePreview" class="image-preview" alt="Preview">
                    <button type="button" class="btn btn-sm btn-danger" onclick="removeImage()">
                        <i class="fas fa-trash"></i> Xóa Ảnh
                    </button>
                </div>
                
                <div class="d-flex gap-3 justify-content-center mt-4">
                    <button type="submit" class="btn btn-upload">
                        <i class="fas fa-upload"></i> Tải Ảnh Lên
                    </button>
                    <a href="/admin/books" class="btn btn-skip">
                        <i class="fas fa-forward"></i> Bỏ Qua
                    </a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('imagePreviewContainer').style.display = 'block';
                    document.querySelector('.upload-area').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        }
        
        function removeImage() {
            document.getElementById('imageFile').value = '';
            document.getElementById('imagePreviewContainer').style.display = 'none';
            document.querySelector('.upload-area').style.display = 'block';
        }
    </script>
</body>
</html>
